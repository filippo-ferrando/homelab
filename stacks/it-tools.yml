services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    networks:
      - traefik-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ittools.rule=Host(`it-tools.rdfilippo.mywire.org`)"
        - "traefik.http.routers.ittools.entrypoints=websecure"
        - "traefik.http.routers.ittools.tls.certresolver=mydns"
        - "traefik.http.services.ittools.loadbalancer.server.port=80"
networks:
  traefik-net:
    external: true
