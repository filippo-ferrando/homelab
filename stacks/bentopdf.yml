services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:latest
    networks:
      - traefik-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.bytestash.rule=Host(`pdf.rdfilippo.mywire.org`)"
        - "traefik.http.routers.bytestash.entrypoints=websecure"
        - "traefik.http.routers.bytestash.tls.certresolver=mydns"
        - "traefik.http.services.bytestash.loadbalancer.server.port=8080"
networks:
  traefik-net:
    external: true
