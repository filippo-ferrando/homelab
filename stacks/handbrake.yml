services:
  handbrake:
    container_name: handbrake
    image: jlesage/handbrake
    networks:
      - traefik-net
    volumes:
      - /opt/swarm_config/handbrake:/config:rw
      - /mnt/media/TV:/storage:rw
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 8G
          cpus: "6.0"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.handbrake.rule=Host(`handbrake.rdfilippo.mywire.org`)"
        - "traefik.http.routers.handbrake.entrypoints=websecure"
        - "traefik.http.routers.handbrake.tls.certresolver=mydns"
        - "traefik.http.services.handbrake.loadbalancer.server.port=5800"
networks:
  traefik-net:
    external: true
