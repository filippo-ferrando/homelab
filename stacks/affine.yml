services:
  affine:
    image: ghcr.io/toeverything/affine:stable
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
    volumes:
      - /opt/swarm_config/affine/affine/storage:/root/.affine/storage
      - /opt/swarm_config/affine/affine/config:/root/.affine/config
    networks:
      - affine-net
      - traefik-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.affine.rule=Host(`affine.rdfilippo.mywire.org`)"
        - "traefik.http.routers.affine.entrypoints=websecure"
        - "traefik.http.routers.affine.tls.certresolver=mydns"
        - "traefik.http.services.affine.loadbalancer.server.port=3010"

  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
    environment:
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
    volumes:
      - /opt/swarm_config/affine/affine/storage:/root/.affine/storage
      - /opt/swarm_config/affine/affine/config:/root/.affine/config
    networks:
      - affine-net
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  redis:
    image: redis:7-alpine
    networks:
      - affine-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: affine
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /opt/swarm_config/affine/db:/var/lib/postgresql/data
    networks:
      - affine-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 3G
          cpus: "3.0"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

networks:
  affine-net:
    driver: overlay
  traefik-net:
    external: true
