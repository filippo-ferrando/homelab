services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --token-file /run/secrets/tunnel_token
    networks:
      - traefik-net
    secrets:
      - tunnel_token
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

networks:
  traefik-net:
    external: true

secrets:
  tunnel_token:
    external: true
    name: cf_tunnel_token
