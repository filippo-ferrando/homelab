services:
  portfolio:
    image: git.rdfilippo.mywire.org/rdfilippo/portfolio:latest
    networks:
      - traefik-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 256G
          cpus: "1.0"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portfolio.rule=Host(`portfolio.rdfilippo.mywire.org`)"
        - "traefik.http.routers.portfolio.entrypoints=websecure"
        - "traefik.http.routers.portfolio.tls.certresolver=mydns"
        - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  traefik-net:
    external: true
